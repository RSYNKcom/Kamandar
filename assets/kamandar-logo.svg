<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Kamandar">
  <title>Kamandar</title>
  <defs>
    <linearGradient id="wood" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#5e3a18"/>
      <stop offset="0.5" stop-color="#8a5829"/>
      <stop offset="1" stop-color="#a9783f"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#d8b97e"/>
      <stop offset="1" stop-color="#a07f4c"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#cdd8ea"/>
      <stop offset="0.55" stop-color="#9fb0cc"/>
      <stop offset="1" stop-color="#6b7d9e"/>
    </linearGradient>
  </defs>

  <!-- recurve bow: thick wooden limb bowing to lower-right, tips recurved back -->
  <path d="M58 206
           C 50 196, 56 188, 70 188
           C 130 188, 196 150, 198 86
           C 198 70, 192 62, 180 62
           C 196 70, 198 84, 188 96"
        fill="none" stroke="url(#wood)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- bowstring (tip to tip) -->
  <path d="M62 198 L190 70" fill="none" stroke="#e4e9f0" stroke-width="2.5"/>

  <!-- arrow shaft, nocked on the string, offset toward upper-left so it reads clear -->
  <path d="M52 188 L204 56" fill="none" stroke="url(#shaft)" stroke-width="8" stroke-linecap="round"/>

  <!-- arrowhead -->
  <path d="M196 40 L222 66 L204 68 L200 72 L194 66 L196 48 Z" fill="url(#steel)" stroke="#5a6c8c" stroke-width="2" stroke-linejoin="round"/>

  <!-- fletching (feathers at the nock) -->
  <path d="M52 188 L30 192 L44 174 Z" fill="#f3f1ea" stroke="#b9b4a4" stroke-width="2" stroke-linejoin="round"/>
  <path d="M52 188 L46 210 L62 196 Z" fill="#e7e3d6" stroke="#b9b4a4" stroke-width="2" stroke-linejoin="round"/>
</svg>
